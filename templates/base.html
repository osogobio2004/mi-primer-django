{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión de Estudiantes{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
</head>
<body>
    <div class="container">
        <nav class="navbar bg-body-tertiary">
            <div class="container">
                <a class="navbar-brand" href="#">
                    <img src="https://getbootstrap.com/docs/5.3/assets/brand/bootstrap-logo.svg" alt="Bootstrap" width="30" height="24">
                    Mi primer proyecto web en Django
                </a>
            </div>
        </nav>
        <div class="row">
            <div class="col-4">
                <ul class="list-group list-group-flush">
                    <li class="list-group-item"><a href="{% url 'index' %}">Index</a></li>
                    <li class="list-group-item"><a href="{% url 'about' %}">Acerca de nosotros</a></li>
                    <li class="list-group-item"><a href="{% url 'contact' %}">Contactanos</a></li>
                    <li class="list-group-item"><a href="{% url 'proyectos' %}" class="list-group-item list-group-item-action">Mis Proyectos</a></li>
                    <li class="list-group-item"><a href="{% url 'multimedia' %}" class="list-group-item list-group-item-action">Galería Multimedia</a></li>
                </ul>
            </div>
            <div class="col-8">
                {% block content %}
                {% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
